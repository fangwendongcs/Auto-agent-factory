name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    name: Test and validate workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Validate workflow JSON
        run: npm run workflow:validate:all

      - name: Run workflow dry-run check
        run: npm run workflow:dry-run

      - name: Check n8n import readiness
        run: npm run import:check
